version: "3.9"

services:
  php:
    build:
      context: .
      dockerfile: Dockerfile.dev

    container_name: ci4-app

    volumes:
      - ./:/var/www/html

    working_dir: /var/www/html

    depends_on:
      - mysql
      - redis

    environment:
      CI_ENVIRONMENT: development
      PHP_MEMORY_LIMIT: 512M
      TZ: America/Mexico_City

    networks:
      - ci4-network

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "php", "-r", "echo 'ok';"]
      interval: 10s
      timeout: 3s
      retries: 3

  nginx:
    image: nginx:1.28-alpine
    container_name: ci4-nginx

    ports:
      - "8080:80"

    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - php

    networks:
      - ci4-network

    restart: unless-stopped

  mysql:
    image: mysql:8.4
    container_name: ci4-mysql

    environment:
      MYSQL_DATABASE: ci4
      MYSQL_USER: ci4
      MYSQL_PASSWORD: ci4
      MYSQL_ROOT_PASSWORD: root

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf

    restart: unless-stopped

    networks:
      - ci4-network

  redis:
    image: redis:7-alpine
    container_name: ci4-redis

    # REMOVIDO expose público
    # ports:
    #   - "6379:6379"

    command: ["redis-server", "--appendonly", "yes"]

    volumes:
      - redis_data:/data

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

    networks:
      - ci4-network

networks:
  ci4-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data: