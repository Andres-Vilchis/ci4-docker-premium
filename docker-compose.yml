version: "3.9"

services:
  php:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: ci4-app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      - mysql
      - redis
    environment:
      CI_ENVIRONMENT: development
      TZ: America/Mexico_City
    networks:
      - ci4-network

  nginx:
    image: nginx:1.28-alpine
    container_name: ci4-nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - ci4-network

  mysql:
    image: mysql:8.4
    container_name: ci4-mysql
    environment:
      MYSQL_DATABASE: ci4
      MYSQL_USER: ci4
      MYSQL_PASSWORD: ci4
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ci4-network

  redis:
    image: redis:7-alpine
    container_name: ci4-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - ci4-network

networks:
  ci4-network:

volumes:
  mysql_data:
  redis_data: