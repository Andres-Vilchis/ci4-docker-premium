version: "3.9"

services:
  php:
    image: ${DOCKER_IMAGE:-ci4-starter:latest}
    container_name: ci4-app
    restart: always
    environment:
      CI_ENVIRONMENT: production
    networks:
      - ci4-network

  nginx:
    image: nginx:1.28-alpine
    container_name: ci4-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - ci4-network

  mysql:
    image: mysql:8.4
    container_name: ci4-mysql
    restart: always
    environment:
      MYSQL_DATABASE: ci4
      MYSQL_USER: ci4
      MYSQL_PASSWORD: ci4
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ci4-network

  redis:
    image: redis:7-alpine
    container_name: ci4-redis
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - ci4-network

networks:
  ci4-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data: